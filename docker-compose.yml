services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - staticfiles:/staticfiles
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: athletics_equipment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_SUPERUSER_USERNAME: Rozhodci
      DJANGO_SUPERUSER_PASSWORD: 123
      DJANGO_SUPERUSER_EMAIL: rozhodci@rozhodci.com
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend
    command: ["sh", "-c", "npm run build && npm run preview -- --port 3001 --host 0.0.0.0"]

  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: athletics_equipment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./CaddyFile:/etc/caddy/Caddyfile
      - staticfiles:/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  staticfiles: